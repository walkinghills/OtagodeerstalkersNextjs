name: Publish Newsletter

# Triggered two ways:
#   1. Automatically via Cloudflare Email Worker (repository_dispatch)
#   2. Manually from GitHub Actions tab (workflow_dispatch) for testing

on:
  repository_dispatch:
    types: [new-newsletter]

  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number (e.g. 2)'
        required: true
        default: '2'
      title:
        description: 'Newsletter title (e.g. April 2026 – Hunt Results & Range News)'
        required: true
        default: 'Test Edition'
      date:
        description: 'Publication date (YYYY-MM-DD)'
        required: true
        default: '2026-04-01'
      content:
        description: 'Newsletter body content (plain text or Markdown). Use ## Heading for sections, - for bullets.'
        required: true
        default: '## Welcome\n\nThis is a test newsletter edition.'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install markdownify

      # Use env: so GitHub Actions resolves expressions before the shell
      # sees them — avoids quoting/escaping problems with arbitrary content.
      - name: Set inputs
        env:
          EV_ISSUE:   ${{ github.event.client_payload.issue_number || github.event.inputs.issue_number }}
          EV_TITLE:   ${{ github.event.client_payload.title        || github.event.inputs.title }}
          EV_DATE:    ${{ github.event.client_payload.date         || github.event.inputs.date }}
          EV_CONTENT: ${{ github.event.client_payload.content      || github.event.inputs.content }}
        run: |
          echo "ISSUE_NUMBER=${EV_ISSUE}"  >> "$GITHUB_ENV"
          echo "TITLE=${EV_TITLE}"         >> "$GITHUB_ENV"
          echo "DATE=${EV_DATE}"           >> "$GITHUB_ENV"
          printf '%s' "${EV_CONTENT}"      > /tmp/newsletter_content.txt
          echo "Inputs set: Issue=${EV_ISSUE}, Title=${EV_TITLE}, Date=${EV_DATE}"

      - name: Generate newsletter Markdown
        run: python3 scripts/generate_newsletter.py

      - name: Commit and push
        run: |
          git config user.name  "Newsletter Bot"
          git config user.email "newsletter-bot@otagodeerstalkers.co.nz"
          git add content/newsletters/
          git diff --staged --quiet && echo "Nothing new to commit — skipping." && exit 0
          git commit -m "Newsletter #${ISSUE_NUMBER}: ${TITLE}"
          git pull --rebase origin main
          git push origin main
