constraints: 'Stack: Next.js 15 + Vercel + GA4 (G-B62VVGCGP1) + Vercel Analytics (pageviews
  only, per locked D-VA). Budget zero NZD recurring. No consent banner; footer privacy
  line only. Locked CSP whitelist must not be broadened. House style: no em dashes
  in new content. Single volunteer developer maintenance. No infra that needs babysitting.
  Custom events to GA4 only (per locked D-VA, D-GA4-GATE).'
domain_context: ''
goal: A SEO/AI-indexing/analytics build that delivers measurable conversion insight
  and search-discoverability gains within 30 days, while remaining maintainable indefinitely
  by a single volunteer developer for a small NZ club brochure site.
non_negotiables: No PII in event props. SessionStorage usage handles incognito and
  multi-tab gracefully. GA4 forwarding never throws if gtag is blocked or absent.
  No CSP broadening. No third-party scripts beyond what is already whitelisted. Tracking
  remains cookieless or compatible with the existing footer disclosure. Analytics
  calls must never throw unhandled exceptions in the UI. No Event/SportsEvent JSON-LD
  on home page events (locked D-JSONLD). No dual-write of custom events to Vercel
  (locked D-VA).
success_criteria: 'Each remaining build item delivers a question it answers, has zero
  ongoing maintenance burden, and is feasible inside the existing stack. T0 probe
  is a hard gate that actually proves event delivery, not just config presence. Join
  funnel answers: of visitors clicking Join on any page, how many reach the external
  NZDA signup, broken down by source page. Direct visits distinguished from internal-funnel
  traffic.'
